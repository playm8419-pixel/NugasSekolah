<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Albert's Profile | Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet"/>
    
    <style>
        body { background-color: #131313; color: #e5e2e1; font-family: 'Inter', sans-serif; }
        
        /* Navbar dengan Blur Effek */
        .noir-nav { 
            background: rgba(18, 18, 18, 0.7); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .table-noir { border-color: #424754; color: #e5e2e1; }
        .table-noir th { background-color: #1b1b1c; border-bottom: 2px solid #005ac2; }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-image: url('https://img.pikbest.com/backgrounds/20250406/futuristic-technology-interface-background-3d-wallpaper-graphic-design-sale-abstract_11651041.jpg!bw800'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
            filter: brightness(25%) contrast(120%) saturate(0.5);
        }

        /* Hover efek untuk baris tabel */
        .table-noir tbody tr:hover {
            background: rgba(0, 90, 194, 0.05);
            transition: 0.3s;
        }
    </style>
</head>
<body class="py-5">

<!-- Background Layers -->
<div class="hero-bg"></div>
<div class="hero-overlay" style="position: absolute; width: 100%; height: 100vh; background: linear-gradient(to bottom, rgba(19,19,19,0.4), #131313); z-index: -1;"></div>    

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top noir-nav py-3">
    <div class="container">
        <a class="navbar-brand fw-black tracking-tighter" href="index.html">GALLERY</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex gap-4 align-items-center">
                <a href="index.html" class="nav-link">Home</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="gallery.html" class="nav-link active text-primary fw-bold">Gallery</a>
            </div>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 100px;">
    <h2 class="display-5 fw-bold mb-5" style="font-family: 'Space Grotesk';">Digital <span class="text-primary">Archive</span></h2>
    
    <!-- Proyek Section -->
    <div class="row g-4 mb-5">
        <div class="col-md-12">
            <div class="card bg-black border-secondary p-5 h-100 rounded-4" style="background: rgba(27, 27, 28, 0.4); backdrop-filter: blur(10px);">
                <div class="card-body text-center">
                    <h5 class="fw-bold text-primary mb-3 text-uppercase" style="letter-spacing: 2px;">Proyek Sekolah</h5>
                    <p class="text-secondary">Koleksi dokumentasi tugas.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Aktivitas Tabel -->
    <h4 class="fw-bold mb-4" style="font-family: 'Space Grotesk';">LOG_AKTIVITAS.exe</h4>
    <div class="table-responsive">
        <table class="table table-dark table-noir align-middle border-secondary">
            <thead>
                <tr>
                    <th class="py-3 px-4">Tahun</th>
                    <th class="py-3">Aktivitas</th>
                    <th class="py-3 text-center">Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="px-4 fw-bold">2024-2027</td>
                    <td>
                        <div class="fw-bold">Kelas XI SMA</div>
                        <div class="small text-secondary">Peminatan: Matematika Lanjut, Informatika, English, Ekonomi.</div>
                    </td>
                    <td class="text-center"><span class="badge bg-success bg-opacity-10 text-success border border-success px-3">Aktif</span></td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="text-center mt-5">
        <a href="index.html" class="text-secondary text-decoration-none opacity-50">← Kembali ke Beranda</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
